<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordpress - Focus NFe</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1 class="header-title">Wordpress - Focus NFe</h1>
            </div>
            <div class="header-right">
                <div class="header-icons">
                    <button class="icon-btn" id="btn-mostrar-logs" title="Mostrar Logs" onclick="toggleLogsServidor()">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="4" width="14" height="12" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M3 8h14M3 12h14" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="btn-logout" title="Sair" onclick="logout()">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M7 17H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h3M13 14l4-4-4-4M17 10H7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <button class="sidebar-item active" data-section="meus-dados">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="10" cy="7" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M5 17c0-2.5 2.5-5 5-5s5 2.5 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span>Meus Dados</span>
                    </button>
                    <button class="sidebar-item" data-section="conexao-woocommerce">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="4" width="14" height="12" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M3 8h14" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="7" cy="11" r="1" fill="currentColor"/>
                            <circle cx="13" cy="11" r="1" fill="currentColor"/>
                        </svg>
                        <span>Conexão WooCommerce</span>
                    </button>
                    <button class="sidebar-item" data-section="conexao-focus">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 2L3 6v8l7 4 7-4V6l-7-4z" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
                        </svg>
                        <span>Conexão FocusNFe</span>
                    </button>
                    <button class="sidebar-item" data-section="pedidos">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="4" width="14" height="12" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M3 8h14" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <span>Pedidos WooCommerce</span>
                    </button>
                    <button class="sidebar-item" data-section="notas-enviadas">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="3" y="4" width="14" height="12" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="M3 8h14M7 12h6" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <span>Notas Enviadas</span>
                    </button>
                    <button class="sidebar-item" data-section="buscar-notas">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <path d="m15 15-3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                        <span>Excluir notas enviadas</span>
                    </button>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <div id="content-area">
                    <!-- Conteúdo será renderizado dinamicamente aqui -->
                </div>
            </main>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
